# Applies pending Supabase migrations on every push to main that touches
# supabase/migrations/. The push completes in seconds while the Vercel build
# takes minutes, so migrations land before the new code goes live — the
# ordering that, done by hand, once broke production.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_DB_PASSWORD   — the project's database password
name: Database migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  push-migrations:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref dzkjsnnjmocjfthymigc

      - name: Apply pending migrations
        run: supabase db push
